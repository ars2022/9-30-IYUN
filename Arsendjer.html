<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arsendjer</title>
  <style>
    :root { --bg: #f0f2f5; --card: #fff; --primary: #0a7cff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); height: 100dvh; display: flex; justify-content: center; align-items: center; }
    .app { width: 100%; max-width: 500px; height: 100vh; background: var(--card); display: flex; flex-direction: column; overflow: hidden; }
    .screen { display: none; flex-direction: column; height: 100%; padding: 16px; }
    .screen.active { display: flex; }
    input, button { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; width: 100%; margin-bottom: 8px; }
    button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
    button.secondary { background: #e5e7eb; color: #1f2937; }
    .msg { background: #e4e6eb; padding: 10px; border-radius: 12px; margin: 6px 0; max-width: 80%; word-break: break-word; }
    .msg.me { background: #0084ff; color: white; align-self: flex-end; }
    .chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
    .attach-btns { display: flex; gap: 6px; }
    .attach-btns button { flex: 1; padding: 10px; font-size: 14px; }
    .hidden { display: none !important; }
    .contacts-list { list-style: none; padding: 0; }
    .contact { padding: 12px; background: #f9fafb; margin: 6px 0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .contact:hover { background: #eef2ff; }
    .contact .name { font-weight: 600; }
    .contact .id { color: #6b7280; font-size: 0.9em; }
    .recording { background: #ef4444 !important; color: white; }
    .btn-group { display: flex; gap: 10px; }
    .btn-group button { flex: 1; }
    .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .name-row span { font-weight: 600; }
    .name-row button { width: auto; padding: 6px 12px; margin: 0; }
    .error-msg { color: red; margin-top: 8px; font-weight: bold; }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Экран входа / регистрации -->
  <div id="loginScreen" class="screen active">
    <h2>🔐 Arsendjer</h2>
    <input type="text" id="pubIdInput" placeholder="Публичный ID (уникальный код)">
    <input type="text" id="nameInput" placeholder="Твоё имя">
    <div class="btn-group">
      <button id="registerBtn" class="secondary">✍️ Зарегистрироваться</button>
      <button id="loginBtn">🔑 Войти</button>
    </div>
    <div id="loginMsg" class="error-msg"></div>
  </div>

  <!-- Главный экран (контакты) -->
  <div id="mainScreen" class="screen">
    <div class="name-row">
      <span>👤 <span id="currentNameDisplay"></span></span>
      <button id="changeNameBtn" class="secondary" style="font-size:14px;">✏️</button>
    </div>
    <div style="display:flex; gap:6px;">
      <input type="text" id="addContactInput" placeholder="Введи ID собеседника">
      <button id="addContactBtn" style="width:auto;">➕ Добавить</button>
    </div>
    <div id="addContactMsg" class="error-msg"></div>
    <h3>📇 Мои контакты</h3>
    <ul id="contactsList" class="contacts-list"></ul>
    <button id="logoutBtn" class="secondary" style="margin-top:auto;">🚪 Выйти</button>
  </div>

  <!-- Экран чата -->
  <div id="chatScreen" class="screen">
    <div style="display:flex; align-items:center; gap:10px;">
      <button id="backBtn" class="secondary" style="width:auto; padding:10px;">←</button>
      <strong id="chatTitle"></strong>
    </div>
    <div id="chatMessages" class="chat-area"></div>
    <div class="attach-btns">
      <button id="attachPhotoBtn">📷 Фото</button>
      <button id="attachVideoBtn">🎬 Видео</button>
      <button id="recordVoiceBtn" class="secondary">🎤 Голос</button>
    </div>
    <div style="display:flex; gap:6px;">
      <input type="text" id="messageInput" placeholder="Сообщение...">
      <button id="sendBtn" style="width:auto;">→</button>
    </div>
    <div id="recordingStatus" style="text-align:center;color:red;font-weight:bold;margin:5px;"></div>
  </div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    // ==================== НАСТРОЙКИ ====================
    const JSONBOX_BASE = 'https://jsonbox.io/';
    let myPublicId = '';
    let myName = '';
    let currentChatId = null;
    let currentContactName = null;
    let pollingTimer = null;

    // ==================== ХРАНИЛИЩЕ ====================
    function getHistory(contactId) {
      return JSON.parse(localStorage.getItem(`chat_${myPublicId}_${contactId}`) || '[]');
    }
    function setHistory(contactId, messages) {
      localStorage.setItem(`chat_${myPublicId}_${contactId}`, JSON.stringify(messages.slice(-200)));
    }
    function saveMessage(contactId, msg) {
      msg.time = Date.now();
      const hist = getHistory(contactId);
      hist.push(msg);
      setHistory(contactId, hist);
      if (currentChatId === contactId) renderChat(contactId);
    }

    function getContacts() {
      return JSON.parse(localStorage.getItem(`contacts_${myPublicId}`) || '[]');
    }
    function setContacts(contacts) {
      localStorage.setItem(`contacts_${myPublicId}`, JSON.stringify(contacts));
    }

    // ==================== ПРОВЕРКА СУЩЕСТВОВАНИЯ ПОЛЬЗОВАТЕЛЯ ====================
    async function getUserInfo(pubId) {
      const boxName = `arsendjer_user_${pubId}`;
      try {
        const resp = await fetch(JSONBOX_BASE + boxName, { cache: 'no-cache' });
        if (!resp.ok) return null;
        const data = await resp.json();
        if (!Array.isArray(data) || data.length === 0) return null;
        return data[0]; // { id, name }
      } catch(e) { return null; }
    }

    async function registerUserPresence(pubId, name) {
      const boxName = `arsendjer_user_${pubId}`;
      try {
        await fetch(JSONBOX_BASE + boxName, { method: 'DELETE' });
      } catch(e) {}
      const resp = await fetch(JSONBOX_BASE + boxName, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: pubId, name: name })
      });
      return resp.ok;
    }

    // ==================== ОБЛАЧНЫЙ ЧАТ (JSONBOX) ====================
    function getChatBoxName(contactId) {
      const ids = [myPublicId, contactId].sort();
      return `arsendjer_chat_${ids[0]}_${ids[1]}`;
    }

    async function uploadChatToCloud(contactId) {
      const boxName = getChatBoxName(contactId);
      const messages = getHistory(contactId);
      try { await fetch(JSONBOX_BASE + boxName, { method: 'DELETE' }); } catch(e) {}
      try {
        const resp = await fetch(JSONBOX_BASE + boxName, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(messages)
        });
        return resp.ok;
      } catch(e) { return false; }
    }

    async function downloadChatFromCloud(contactId) {
      const boxName = getChatBoxName(contactId);
      try {
        const resp = await fetch(JSONBOX_BASE + boxName, { cache: 'no-cache' });
        if (!resp.ok) return false;
        const data = await resp.json();
        if (!Array.isArray(data)) return false;
        data.sort((a, b) => (a.time || 0) - (b.time || 0));
        setHistory(contactId, data);
        return true;
      } catch(e) { return false; }
    }

    // ==================== ОТПРАВКА ФАЙЛОВ (CATBOX.MOE) ====================
    function uploadFileToCatbox(file, callback) {
      const fd = new FormData();
      fd.append('reqtype', 'fileupload');
      fd.append('fileToUpload', file);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://catbox.moe/user/api.php', true);
      xhr.onload = function() {
        if (xhr.status === 200 && xhr.responseText.startsWith('http')) {
          callback(null, xhr.responseText.trim());
        } else {
          callback(new Error(xhr.responseText));
        }
      };
      xhr.onerror = () => callback(new Error('Сеть недоступна'));
      xhr.send(fd);
    }

    async function sendFileMessage(file) {
      if (!currentChatId) return;
      uploadFileToCatbox(file, async (err, url) => {
        if (err) {
          alert('Ошибка загрузки: ' + err.message);
          return;
        }
        const msg = {
          from: myPublicId,
          name: myName,
          type: 'file',
          url: url,
          filename: file.name || 'file',
          time: Date.now()
        };
        saveMessage(currentChatId, msg);
        await uploadChatToCloud(currentChatId);
        renderChat(currentChatId);
      });
    }

    // ==================== ГОЛОСОВЫЕ ====================
    let mediaRecorder = null, audioChunks = [];
    document.getElementById('recordVoiceBtn').addEventListener('click', async () => {
      const btn = document.getElementById('recordVoiceBtn');
      const status = document.getElementById('recordingStatus');
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        btn.classList.remove('recording');
        status.innerText = '';
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const file = new File([blob], 'voice.webm', { type: 'audio/webm' });
          sendFileMessage(file);
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        btn.classList.add('recording');
        status.innerText = '🔴 Запись... нажми ещё раз для отправки';
      } catch(e) {
        alert('Микрофон недоступен: ' + e.message);
      }
    });

    // ==================== ЭКРАНЫ ====================
    const loginScreen = document.getElementById('loginScreen');
    const mainScreen = document.getElementById('mainScreen');
    const chatScreen = document.getElementById('chatScreen');

    function showMain() {
      loginScreen.classList.remove('active');
      mainScreen.classList.add('active');
      chatScreen.classList.remove('active');
      document.getElementById('currentNameDisplay').innerText = myName;
      updateContactList();
    }

    async function showChat(contactId, contactName = null) {
      loginScreen.classList.remove('active');
      mainScreen.classList.remove('active');
      chatScreen.classList.add('active');
      currentChatId = contactId;
      if (!contactName) {
        const contacts = getContacts();
        const found = contacts.find(c => c.id === contactId);
        contactName = found ? found.name : contactId;
      }
      currentContactName = contactName;
      document.getElementById('chatTitle').innerText = contactName;
      await downloadChatFromCloud(contactId);
      renderChat(contactId);
      startPolling(contactId);
    }

    function updateContactList() {
      const list = document.getElementById('contactsList');
      const contacts = getContacts();
      list.innerHTML = '';
      contacts.forEach(contact => {
        const li = document.createElement('li');
        li.className = 'contact';
        li.innerHTML = `
          <span class="name">${contact.name || contact.id}</span>
          <span class="id">${contact.id}</span>
        `;
        li.onclick = () => showChat(contact.id, contact.name);
        list.appendChild(li);
      });
    }

    function renderChat(contactId) {
      const container = document.getElementById('chatMessages');
      const hist = getHistory(contactId);
      container.innerHTML = '';
      hist.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.from === myPublicId ? 'me' : '');
        let content = '';
        if (msg.type === 'file') {
          if (msg.filename && msg.filename.match(/\.(png|jpg|jpeg|gif|webp|svg)$/i)) {
            content = `<img src="${msg.url}" style="max-width:100%;border-radius:8px;">`;
          } else if (msg.filename && msg.filename.match(/\.(mp4|webm|mov|avi)$/i)) {
            content = `<video controls style="max-width:100%;"><source src="${msg.url}" type="video/mp4"></video>`;
          } else if (msg.type === 'voice' || (msg.filename && msg.filename.endsWith('.webm'))) {
            content = `<audio controls src="${msg.url}"></audio>`;
          } else {
            content = `<a href="${msg.url}" target="_blank">📎 ${msg.filename || 'Файл'}</a>`;
          }
        } else {
          content = msg.text || '';
        }
        div.innerHTML = `
          <div style="font-weight:600;font-size:0.85em;">${msg.name || msg.from}</div>
          ${content}
          <div style="font-size:0.7em;color:gray;text-align:right;">${new Date(msg.time).toLocaleTimeString()}</div>
        `;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    // ==================== ПОЛЛИНГ ====================
    function startPolling(contactId) {
      stopPolling();
      pollingTimer = setInterval(async () => {
        await downloadChatFromCloud(contactId);
        if (currentChatId === contactId) renderChat(contactId);
      }, 2000);
    }

    function stopPolling() {
      if (pollingTimer) {
        clearInterval(pollingTimer);
        pollingTimer = null;
      }
    }

    // ==================== ОТПРАВКА ТЕКСТА ====================
    async function sendTextMessage() {
      const text = document.getElementById('messageInput').value.trim();
      if (!text || !currentChatId) return;
      const msg = { from: myPublicId, name: myName, type: 'text', text, time: Date.now() };
      saveMessage(currentChatId, msg);
      await uploadChatToCloud(currentChatId);
      document.getElementById('messageInput').value = '';
      renderChat(currentChatId);
    }

    // ==================== АУТЕНТИФИКАЦИЯ ====================
    async function handleRegister() {
      const pub = document.getElementById('pubIdInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      const msgEl = document.getElementById('loginMsg');
      if (!pub || !name) { msgEl.innerText = 'Введи ID и имя'; return; }
      if (pub.includes(' ')) { msgEl.innerText = 'ID не должен содержать пробелов'; return; }

      // Проверяем, не занят ли ID
      const existing = await getUserInfo(pub);
      if (existing) {
        msgEl.innerText = 'Этот ID уже используется';
        return;
      }

      // Регистрируем пользователя
      await registerUserPresence(pub, name);
      myPublicId = pub;
      myName = name;
      localStorage.setItem('ars_pub', pub);
      localStorage.setItem('ars_name', name);
      setContacts([]); // новые контакты пусты
      showMain();
    }

    function handleLogin() {
      const pub = document.getElementById('pubIdInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      const msgEl = document.getElementById('loginMsg');
      if (!pub || !name) { msgEl.innerText = 'Введи ID и имя'; return; }
      if (pub.includes(' ')) { msgEl.innerText = 'ID не должен содержать пробелов'; return; }

      myPublicId = pub;
      myName = name;
      localStorage.setItem('ars_pub', pub);
      localStorage.setItem('ars_name', name);
      // Загружаем контакты из localStorage (они уже привязаны к этому ID)
      // и сразу показываем главный экран
      showMain();
    }

    // Привязываем кнопки
    document.getElementById('registerBtn').addEventListener('click', handleRegister);
    document.getElementById('loginBtn').addEventListener('click', handleLogin);

    // ==================== ДОБАВЛЕНИЕ КОНТАКТА ====================
    document.getElementById('addContactBtn').addEventListener('click', async () => {
      const id = document.getElementById('addContactInput').value.trim();
      const msgEl = document.getElementById('addContactMsg');
      if (!id) return;
      if (id === myPublicId) {
        msgEl.innerText = 'Нельзя добавить самого себя';
        return;
      }
      const userInfo = await getUserInfo(id);
      if (!userInfo) {
        msgEl.innerText = 'Пользователь с таким ID не найден';
        return;
      }
      const contactName = userInfo.name || id;
      const contacts = getContacts();
      const existing = contacts.find(c => c.id === id);
      if (!existing) {
        contacts.push({ id: id, name: contactName });
        setContacts(contacts);
      }
      updateContactList();
      document.getElementById('addContactInput').value = '';
      msgEl.innerText = '';
      showChat(id, contactName);
    });

    // ==================== ОСТАЛЬНЫЕ КНОПКИ ====================
    document.getElementById('backBtn').addEventListener('click', () => {
      stopPolling();
      currentChatId = null;
      chatScreen.classList.remove('active');
      mainScreen.classList.add('active');
    });

    document.getElementById('sendBtn').addEventListener('click', sendTextMessage);

    document.getElementById('attachPhotoBtn').addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = () => { if (inp.files[0]) sendFileMessage(inp.files[0]); };
      inp.click();
    });

    document.getElementById('attachVideoBtn').addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'video/*';
      inp.onchange = () => { if (inp.files[0]) sendFileMessage(inp.files[0]); };
      inp.click();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      stopPolling();
      myPublicId = '';
      myName = '';
      currentChatId = null;
      loginScreen.classList.add('active');
      mainScreen.classList.remove('active');
      chatScreen.classList.remove('active');
    });

    document.getElementById('changeNameBtn').addEventListener('click', async () => {
      const newName = prompt('Новое имя:', myName);
      if (newName && newName.trim() !== '') {
        myName = newName.trim();
        localStorage.setItem('ars_name', myName);
        document.getElementById('currentNameDisplay').innerText = myName;
        await registerUserPresence(myPublicId, myName);
        // Обновим имена в контактах (у других они увидят при поиске)
      }
    });

    // Автозаполнение
    const savedPub = localStorage.getItem('ars_pub');
    const savedName = localStorage.getItem('ars_name');
    if (savedPub) {
      document.getElementById('pubIdInput').value = savedPub;
      document.getElementById('nameInput').value = savedName || '';
    }
  });
</script>
</body>
</html>
